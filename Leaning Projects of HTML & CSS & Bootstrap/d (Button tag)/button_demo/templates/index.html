<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Different Kinds of Buttons</title>
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Button Examples</h1>
    <p>This page shows different kinds of buttons made with HTML and styled with CSS.</p>

    <section class="button-group">
      <h2>Basic Buttons</h2>
      <button class="btn btn-primary">Primary Button</button>
      <button class="btn btn-secondary">Secondary Button</button>
      <button class="btn btn-success">Success Button</button>
      <button class="btn btn-danger">Danger Button</button>
    </section>

    <section class="button-group">
      <h2>Outline Buttons</h2>
      <button class="btn btn-outline-primary">Outline Primary</button>
      <button class="btn btn-outline-dark">Outline Dark</button>
    </section>

    <section class="button-group">
      <h2>Rounded and Pill Buttons</h2>
      <button class="btn btn-rounded">Rounded Button</button>
      <button class="btn btn-pill">Pill Button</button>
    </section>

    <section class="button-group">
      <h2>Special Buttons</h2>
      <button class="btn btn-shadow">Shadow Button</button>
      <button class="btn btn-gradient">Gradient Button</button>
      <button class="btn btn-disabled" disabled>Disabled Button</button>
    </section>

    <section class="button-group">
      <h2>Full Width Button</h2>
      <button class="btn btn-block">Block Button</button>
    </section>

    <section class="button-group">
      <h2>Button Inside a Form</h2>
      <form>
        <input type="text" placeholder="Type something here">
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </section>
  </div>
</body>
</html>
