<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">MySocialApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('about') }}">About Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center text-white py-5">
        <div class="container">
            <h1 class="display-5 fw-bold">Welcome to Our Social Network</h1>
            <p class="lead">A simple Flask project using Bootstrap and Jinja templates.</p>
        </div>
    </header>

    <main class="container my-5">
        <h2 class="mb-4">Latest Posts</h2>

        {% for post in posts %}
        <div class="card shadow-sm mb-4 post-card">
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <img src="{{ url_for('static', filename=post.profile_image) }}"
                         alt="{{ post.username }} profile picture"
                         class="profile-img me-3">
                    <div>
                        <h5 class="mb-0">{{ post.username }}</h5>
                        <small class="text-muted">Published on {{ post.publication_date }}</small>
                    </div>
                </div>

                <p class="card-text">{{ post.text }}</p>

                {% if post.post_image %}
                <img src="{{ url_for('static', filename=post.post_image) }}"
                     alt="Post image"
                     class="img-fluid rounded post-image mt-2">
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
