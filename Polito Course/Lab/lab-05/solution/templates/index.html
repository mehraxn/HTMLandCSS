{% extends "base.html" %}

{% block title %}Home - My Cool Social Network{% endblock %}

{% block content %}

  {% for post in posts %}
    <article class="post-card mb-4">
      <div class="row g-0">

        <div class="col-12 col-sm-4 col-lg-3">
          <a href="{{ url_for('post_detail', post_id=post.id) }}">
            <img
              src="{{ url_for('static', filename='images/' + post.post_image) }}"
              alt="Post image by {{ post.username }}"
              class="post-image img-fluid"
            >
          </a>
        </div>

        <div class="col-12 col-sm-8 col-lg-9 ps-sm-4 pt-3 pt-sm-0">
          <div class="post-header">
            <div class="post-user">
              <img
                src="{{ url_for('static', filename='images/' + post.profile_image) }}"
                alt="Profile picture of {{ post.username }}"
                class="profile-image"
              >
              <span>@{{ post.username }}</span>
            </div>

            <span class="post-date">{{ post.publication_date }}</span>
          </div>

          <p class="post-text">{{ post.text }}</p>
        </div>

      </div>
    </article>
  {% endfor %}

{% endblock %}
