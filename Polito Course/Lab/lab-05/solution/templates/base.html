<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Cool Social Network{% endblock %}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <nav class="navbar navbar-expand-md navbar-dark site-navbar px-3">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">My Cool Social Network</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('index') }}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('about') }}">About us</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <aside class="col-12 col-md-3 col-xl-2 sidebar py-4">
        <p class="sidebar-title">Filter by</p>

        <ul class="sidebar-list">
          <li><a href="#" class="sidebar-link active">Today</a></li>
          <li><a href="#" class="sidebar-link">This week</a></li>
          <li><a href="#" class="sidebar-link">This month</a></li>
        </ul>
      </aside>

      <main class="col-12 col-md-9 col-xl-10 py-4 px-4">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <button class="btn add-button" aria-label="New post">
    <i class="bi bi-plus-lg"></i>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
