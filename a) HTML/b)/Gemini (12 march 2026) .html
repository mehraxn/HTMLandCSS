<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Chef's Knife Slicing - Version 2</title>
    <style>
        :root {
            --wood-top: #a17d69;
            --wood-front: #6e4e3b;
            --cuke-skin: #1b5e20;
            --cuke-inside: #c8e6c9;
            --steel: linear-gradient(180deg, #e0e0e0 0%, #b0b0b0 40%, #757575 100%);
            --handle: #1c2833;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e5ec;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 3D Cutting Board */
        .scene {
            position: relative;
            width: 700px;
            height: 350px;
            background: var(--wood-top);
            border-radius: 12px;
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,0.1), 
                0 30px 40px -10px rgba(0,0,0,0.4);
            border-bottom: 25px solid var(--wood-front);
            display: flex;
            align-items: flex-end;
            padding-bottom: 50px;
            perspective: 1000px;
        }

        /* Wood Grain Detail */
        .scene::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                #000 10px,
                #000 12px
            );
            border-radius: 12px;
            pointer-events: none;
        }

        /* The Cucumber wrapper masks the shrinking vegetable */
        .cucumber-wrapper {
            position: absolute;
            right: 200px; /* Distance from right */
            bottom: 50px;
            width: 250px;
            height: 65px;
            overflow: hidden;
        }

        .cucumber-body {
            position: absolute;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2e7d32, var(--cuke-skin));
            border-radius: 10px 35px 35px 10px;
            box-shadow: inset 0 -15px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }

        /* Individual Slices */
        .slice {
            position: absolute;
            width: 16px;
            height: 63px;
            background: var(--cuke-inside);
            border: 3px solid var(--cuke-skin);
            border-radius: 50%;
            left: 230px; /* Drop zone */
            bottom: 50px;
            z-index: 5;
            opacity: 1;
            /* Moisture center */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .slice::after {
            content: '';
            position: absolute;
            top: 25%; left: 25%; right: 25%; bottom: 25%;
            border-radius: 50%;
            border: 1px dotted rgba(27, 94, 32, 0.4);
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 60%);
        }

        /* The Knife */
        .knife {
            position: absolute;
            right: 240px;
            bottom: 120px;
            z-index: 10;
            transform-origin: 90% 10%;
            filter: drop-shadow(-5px 15px 8px rgba(0,0,0,0.3));
        }

        .blade {
            width: 260px;
            height: 65px;
            background: var(--steel);
            clip-path: polygon(0 0, 100% 0, 100% 15%, 20% 100%, 0 100%);
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Shine on the Blade */
        .blade::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 50px; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.9), transparent);
            transform: rotate(30deg);
            animation: blade-shine 1s ease-in-out infinite;
        }

        .handle {
            position: absolute;
            right: -110px;
            top: -8px;
            width: 120px;
            height: 40px;
            background: var(--handle);
            border-radius: 8px 20px 20px 8px;
            box-shadow: inset 0 8px 10px rgba(255,255,255,0.1), inset 0 -5px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        /* Rivets in the handle */
        .handle::before, .handle::after, .handle-rivet {
            content: '';
            width: 10px; height: 10px;
            background: #95a5a6;
            border-radius: 50%;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.5), inset 0 -2px 2px rgba(0,0,0,0.5);
        }

        /* Animations */
        @keyframes chop-action {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-10px, -20px) rotate(5deg); } /* Lift and pull back slightly */
            45% { transform: translate(15px, 80px) rotate(-3deg); } /* Strike down and forward */
            55% { transform: translate(15px, 80px) rotate(-3deg); } /* Hold in board briefly */
            100% { transform: translate(0, 0) rotate(0deg); } /* Return */
        }

        @keyframes cuke-squish {
            0%, 100% { transform: scaleY(1) translateX(var(--feed-x, 0)); }
            40% { transform: scaleY(0.92) translateX(var(--feed-x, 0)); } /* Compress on impact */
            50% { transform: scaleY(1) translateX(var(--feed-x, 0)); }
        }

        @keyframes blade-shine {
            0% { left: -50%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .knife.chopping { animation: chop-action 1s infinite; }
        .cucumber-body.chopping { animation: cuke-squish 1s infinite; }

        /* Slice Physics Animations added via JS */
    </style>
</head>
<body>

    <div class="scene" id="board">
        <div class="cucumber-wrapper">
            <div class="cucumber-body chopping" id="cuke"></div>
        </div>
        
        <div class="knife chopping" id="knife">
            <div class="blade"></div>
            <div class="handle"><div class="handle-rivet"></div></div>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const cuke = document.getElementById('cuke');
        let feedPosition = 0; 
        let sliceCount = 0;

        // Sync with the 1s CSS animation
        setInterval(() => {
            if(sliceCount < 18) { // Stop before we run out of cucumber
                chopSlice();
            } else {
                // Reset after the cucumber is fully chopped
                setTimeout(() => {
                    document.querySelectorAll('.slice').forEach(s => s.remove());
                    feedPosition = 0;
                    cuke.style.setProperty('--feed-x', '0px');
                    sliceCount = 0;
                }, 2000);
            }
        }, 1000); 

        function chopSlice() {
            // Wait for the knife to hit the board (approx 45% of 1000ms)
            setTimeout(() => {
                sliceCount++;
                
                // 1. Create the slice
                const slice = document.createElement('div');
                slice.className = 'slice';
                board.appendChild(slice);

                // 2. Feed the cucumber forward (visually shrinking it)
                feedPosition += 12; 
                cuke.style.setProperty('--feed-x', `-${feedPosition}px`);

                // 3. Animate the slice falling into a messy pile
                // Randomize how far it rolls and how it rotates to create a pile
                const rollDistance = Math.random() * -80 - 20; // Rolls left
                const fallAngle = Math.random() * -120 - 40; // Tilts left

                slice.animate([
                    { transform: 'translate(0, 0) rotate(0deg)' },
                    { transform: `translate(${rollDistance}px, 20px) rotate(${fallAngle}deg)` }
                ], {
                    duration: 400,
                    easing: 'ease-out',
                    fill: 'forwards'
                });

                // 4. Subtle board vibration
                board.style.transform = 'translateY(2px)';
                setTimeout(() => board.style.transform = 'translateY(0)', 40);

            }, 450);
        }
    </script>
</body>
</html>
